# GUI Deployment - Streamlit frontend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: copilot-gui
  namespace: devops-copilot
  labels:
    app: copilot-gui
    component: gui
    version: v1.1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: copilot-gui
  template:
    metadata:
      labels:
        app: copilot-gui
        component: gui
        version: v1.1
    spec:
      serviceAccountName: devops-copilot
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: gui
          image: ghcr.io/WhoisMonesh/devops-ai-copilot/devops-ai-copilot-gui:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8501
              name: http
          env:
            - name: AGENT_URL
              value: "http://copilot-agent.devops-copilot.svc:80"
            - name: AGENT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: copilot-secrets
                  key: api-key
                  optional: true
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: copilot-gui
  namespace: devops-copilot
  labels:
    app: copilot-gui
spec:
  type: ClusterIP
  selector:
    app: copilot-gui
  ports:
    - name: http
      port: 8501
      targetPort: 8501
---
