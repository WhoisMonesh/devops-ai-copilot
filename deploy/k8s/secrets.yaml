# Kubernetes Secrets Template
# IMPORTANT: Do NOT commit real secrets. Use this as a template.
# Replace <base64-value> with: echo -n 'your-value' | base64
# Or use Sealed Secrets / AWS Secrets Manager / Vault for production.
#
# To create from .env file:
#   kubectl create secret generic copilot-secrets \
#     --from-env-file=.env -n devops-copilot --dry-run=client -o yaml
apiVersion: v1
kind: Secret
metadata:
  name: copilot-secrets
  namespace: devops-copilot
  labels:
    app: devops-copilot
type: Opaque
data:
  # Agent API key (generate with: openssl rand -hex 32)
  # echo -n 'your-api-key' | base64
  api-key: <base64-encoded-api-key>

  # Jenkins credentials
  JENKINS_USERNAME: <base64-encoded-jenkins-username>
  JENKINS_API_TOKEN: <base64-encoded-jenkins-api-token>

  # Artifactory credentials
  ARTIFACTORY_USERNAME: <base64-encoded-artifactory-username>
  ARTIFACTORY_API_KEY: <base64-encoded-artifactory-api-key>

  # Kibana credentials (if auth enabled)
  KIBANA_USERNAME: <base64-encoded-kibana-username>
  KIBANA_PASSWORD: <base64-encoded-kibana-password>

  # Grafana API key (optional)
  GRAFANA_API_KEY: <base64-encoded-grafana-api-key>
---
# ServiceAccount for in-cluster K8s API access
apiVersion: v1
kind: ServiceAccount
metadata:
  name: devops-copilot
  namespace: devops-copilot
---
# ClusterRole - read-only access to K8s resources
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: devops-copilot-reader
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints", "nodes", "namespaces", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
---
# Bind ClusterRole to ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: devops-copilot-reader-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: devops-copilot-reader
subjects:
  - kind: ServiceAccount
    name: devops-copilot
    namespace: devops-copilot
---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: devops-copilot
  labels:
    app.kubernetes.io/name: devops-copilot
