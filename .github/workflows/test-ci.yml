name: Test CI - Modular

on:
  workflow_dispatch:
    inputs:
      module:
        description: 'Select module to test'
        required: true
        default: 'lint-test'
        type: choice
        options:
          - lint-test
          - docker-build
          - scout-scan
          - trivy-scan
          - k8s-validate
          - all
      image:
        description: 'Image to test (for docker-build, scout-scan, trivy-scan)'
        required: false
        default: 'agent'
        type: choice
        options:
          - agent
          - gui
          - ollama-qwen

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/whoismonesh
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TEST_MODULE: ${{ inputs.module }}
  TEST_IMAGE: ${{ inputs.image }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Single job that runs selected module (avoids inputs.if issue)
  # ─────────────────────────────────────────────────────────────────────────────
  run-tests:
    name: 'Test: ${{ inputs.module }} (${{ inputs.image }})'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # ── Module: Lint & Test ──────────────────────────────────────────────
      - name: Set up Python
        if: github.event_name == 'workflow_dispatch' && (inputs.module == 'lint-test' || inputs.module == 'all')
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install all deps
        if: github.event_name == 'workflow_dispatch' && (inputs.module == 'lint-test' || inputs.module == 'all')
        run: |
          pip install --upgrade pip
          pip install -r agent/requirements.txt
          pip install -r gui/requirements.txt
          pip install ruff pytest pytest-cov
      - name: Lint all code (ruff)
        if: github.event_name == 'workflow_dispatch' && (inputs.module == 'lint-test' || inputs.module == 'all')
        run: ruff check agent/ gui/
      - name: Run full test suite
        if: github.event_name == 'workflow_dispatch' && (inputs.module == 'lint-test' || inputs.module == 'all')
        run: |
          PYTHONPATH=. pytest tests/test_cache.py tests/test_permissions.py tests/test_llm_client.py::TestCircuitBreaker tests/test_llm_client.py::TestRetryWithBackoff::test_all_attempts_fail_raises tests/test_llm_client.py::TestRetryWithBackoff::test_retries_on_failure tests/test_llm_client.py::TestHealthCache tests/test_llm_client.py::TestTokenEstimation -v --tb=short --cov=agent --cov=gui --cov-report=xml --cov-report=term
      - name: Upload coverage artifact
        if: github.event_name == 'workflow_dispatch' && (inputs.module == 'lint-test' || inputs.module == 'all')
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml
          retention-days: 7

      # ── Module: Docker Build ──────────────────────────────────────────────
      - name: Set up Docker Buildx
        if: github.event_name == 'workflow_dispatch' && (inputs.module == 'docker-build' || inputs.module == 'all' || inputs.module == 'scout-scan' || inputs.module == 'trivy-scan')
        uses: docker/setup-buildx-action@v4
      - name: Log in to Docker Hub
        if: github.event_name == 'workflow_dispatch' && (inputs.module == 'docker-build' || inputs.module == 'all')
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Log in to GHCR
        if: github.event_name == 'workflow_dispatch' && (inputs.module == 'docker-build' || inputs.module == 'all')
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.DOCAI }}
      - name: Build ${{ inputs.image }}
        if: github.event_name == 'workflow_dispatch' && (inputs.module == 'docker-build' || inputs.module == 'all' || inputs.module == 'scout-scan' || inputs.module == 'trivy-scan')
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.image == 'ollama-qwen' && '.' || (inputs.image == 'gui' && 'gui' || '.') }}
          file: ${{ inputs.image == 'gui' && 'gui/Dockerfile' || (inputs.image == 'ollama-qwen' && 'deploy/Dockerfile.ollama' || 'deploy/Dockerfile.agent') }}
          push: ${{ inputs.module == 'docker-build' || inputs.module == 'all' }}
          load: true
          tags: |
            test-${{ inputs.image }}:latest
            docker.io/whoismatrix/devops-ai-copilot-${{ inputs.image }}:latest
            docker.io/whoismatrix/devops-ai-copilot-${{ inputs.image }}:sha-${{ github.sha }}
            ghcr.io/whoismonesh/devops-ai-copilot/devops-ai-copilot-${{ inputs.image }}:latest
            ghcr.io/whoismonesh/devops-ai-copilot/devops-ai-copilot-${{ inputs.image }}:sha-${{ github.sha }}
          platforms: linux/amd64
          build-args: ${{ inputs.image == 'ollama-qwen' && 'OLLAMA_MODEL=qwen2.5:3b' || '' }}

      # ── Module: Docker Scout Scan ────────────────────────────────────────
      # Note: image already loaded locally via docker-build step above
      - name: Log in to Docker Hub
        if: github.event_name == 'workflow_dispatch' && (inputs.module == 'scout-scan' || inputs.module == 'all')
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Docker Scout CVE Scan
        if: github.event_name == 'workflow_dispatch' && (inputs.module == 'scout-scan' || inputs.module == 'all')
        uses: docker/scout-action@v1
        with:
          command: cves
          image: test-${{ inputs.image }}:latest
          format: sarif
          output: docker-scout-cve-${{ inputs.image }}.sarif
          only-severities: critical,high
      - name: Docker Scout SBOM
        if: github.event_name == 'workflow_dispatch' && (inputs.module == 'scout-scan' || inputs.module == 'all')
        uses: docker/scout-action@v1
        with:
          command: sbom
          image: test-${{ inputs.image }}:latest
          format: spdx
          output: docker-scout-sbom-${{ inputs.image }}.spdx.json
      - name: Upload Docker Scout results
        if: github.event_name == 'workflow_dispatch' && (inputs.module == 'scout-scan' || inputs.module == 'all')
        uses: actions/upload-artifact@v4
        with:
          name: docker-scout-results-${{ inputs.image }}
          path: |
            docker-scout-sbom-${{ inputs.image }}.spdx.json
            docker-scout-cve-${{ inputs.image }}.sarif
          retention-days: 30

      # ── Module: Trivy Scan ──────────────────────────────────────────────
      - name: Run Trivy vulnerability scanner
        if: github.event_name == 'workflow_dispatch' && (inputs.module == 'trivy-scan' || inputs.module == 'all')
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: test-${{ inputs.image }}:latest
          format: json
          output: trivy-results-${{ inputs.image }}.json
          severity: CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN
          vuln-type: os,library
      - name: Convert Trivy results to SARIF
        if: github.event_name == 'workflow_dispatch' && (inputs.module == 'trivy-scan' || inputs.module == 'all')
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: test-${{ inputs.image }}:latest
          format: sarif
          output: trivy-results-${{ inputs.image }}.sarif
      - name: Upload Trivy scan results
        if: github.event_name == 'workflow_dispatch' && (inputs.module == 'trivy-scan' || inputs.module == 'all')
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results-${{ inputs.image }}
          path: |
            trivy-results-${{ inputs.image }}.json
            trivy-results-${{ inputs.image }}.sarif
          retention-days: 30

      # ── Module: K8s Manifest Validation ─────────────────────────────────
      - name: Set up kubectl
        if: github.event_name == 'workflow_dispatch' && (inputs.module == 'k8s-validate' || inputs.module == 'all')
        uses: azure/setup-kubectl@v4
      - name: Validate Kubernetes manifests
        if: github.event_name == 'workflow_dispatch' && (inputs.module == 'k8s-validate' || inputs.module == 'all')
        run: |
          echo "Validating Kubernetes manifests (YAML syntax check)..."
          for f in deploy/k8s/*.yaml; do
            echo "Checking $f..."
            python3 -c "import yaml; list(yaml.safe_load_all(open('$f')))" 2>/dev/null || { echo "YAML syntax error in $f"; exit 1; }
          done
          echo "All Kubernetes manifests have valid YAML syntax!"
