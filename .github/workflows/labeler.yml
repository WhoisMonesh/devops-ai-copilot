name: "PR Auto-Labeler"

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Label PR by changed files
    runs-on: ubuntu-latest
    steps:
      - name: Auto-label PR
        uses: actions/labeler@v6
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml

  # ---- PR Size Labeler ---------------------------------------------------
  size-label:
    name: Label PR by size
    runs-on: ubuntu-latest
    steps:
      - name: Add size label
        uses: codelytv/pr-size-labeler@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: "size/XS"
          xs_max_size: 10
          s_label: "size/S"
          s_max_size: 50
          m_label: "size/M"
          m_max_size: 200
          l_label: "size/L"
          l_max_size: 500
          xl_label: "size/XL"
          xl_max_size: 1000
          fail_if_xl: false
          message_if_xl: |
            :warning: This PR is very large. Please consider breaking it into smaller PRs.
            Large PRs are harder to review and may introduce hidden bugs.
