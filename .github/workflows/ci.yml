name: CI - Lint, Test, Build & Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/whoismonesh
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install all deps
        run: |
          pip install --upgrade pip
          pip install -r agent/requirements.txt
          pip install -r gui/requirements.txt
          pip install ruff pytest
      - name: Lint all code (ruff)
        run: ruff check agent/ gui/
      - name: Run tests
        run: |
          PYTHONPATH=. pytest tests/test_cache.py tests/test_permissions.py tests/test_llm_client.py::TestCircuitBreaker tests/test_llm_client.py::TestRetryWithBackoff::test_all_attempts_fail_raises tests/test_llm_client.py::TestRetryWithBackoff::test_retries_on_failure tests/test_llm_client.py::TestHealthCache tests/test_llm_client.py::TestTokenEstimation -v --tb=short

  build-all:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: lint-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      matrix:
        include:
          - image: agent
            dockerfile: deploy/Dockerfile.agent
            context: .
            platforms: linux/amd64,linux/arm64
            cache_scope: agent-cache
            build_args: ""
          - image: gui
            dockerfile: gui/Dockerfile
            context: gui
            platforms: linux/amd64,linux/arm64
            cache_scope: gui-cache
            build_args: ""
          - image: ollama
            dockerfile: deploy/Dockerfile.ollama
            context: .
            platforms: linux/amd64
            cache_scope: ollama-cache
            build_args: OLLAMA_MODEL=qwen2.5:3b
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.DOCAI }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Extract metadata for ${{ matrix.image }}
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/devops-ai-copilot-${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,onmatch=replace
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ github.sha }},enable=${{ github.ref == 'refs/heads/main' }}
      - name: Build & push devops-ai-copilot-${{ matrix.image }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,scope=${{ matrix.cache_scope }},mode=max
          platforms: ${{ matrix.platforms }}
          build-args: ${{ matrix.build_args }}
      - name: Save image tag
        run: |
          mkdir -p build-meta
          echo "${{ steps.meta.outputs.tags }}" > build-meta/${{ matrix.image }}-tag.txt
      - name: Upload build meta
        uses: actions/upload-artifact@v4
        with:
          name: build-meta-${{ matrix.image }}
          path: build-meta/${{ matrix.image }}-tag.txt
          retention-days: 1

  scan-all:
    name: Scan ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: build-all
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      matrix:
        image: [agent, gui, ollama]
    permissions:
      contents: read
      packages: read
    steps:
      - name: Download build meta
        uses: actions/download-artifact@v4
        with:
          pattern: build-meta-*
          path: build-meta
          merge-multiple: true

      - name: Set image tag
        id: image
        run: |
          IMAGE_TAG=$(cat build-meta/${{ matrix.image }}-tag.txt)
          echo "tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Log in to GHCR for image pull
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.DOCAI }}

      - name: Pull Docker image
        run: docker pull ${{ steps.image.outputs.tag }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.image.outputs.tag }}
          format: json
          output: trivy-results-${{ matrix.image }}.json
          severity: CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN
          vuln-type: os,library
          limit: 100

      - name: Run Trivy config scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.image.outputs.tag }}
          scan-ref: .
          scan-type: config
          format: table
          output: trivy-config-${{ matrix.image }}.txt

      - name: Convert Trivy results to SARIF
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.image.outputs.tag }}
          format: sarif
          output: trivy-results-${{ matrix.image }}.sarif

      - name: Create plain text summary
        env:
          SCAN_DATE: ${{ steps.image.outputs.tag }}
        run: python3 scripts/generate_trivy_summary.py ${{ matrix.image }}

      - name: Upload Trivy scan results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results-${{ matrix.image }}
          path: |
            trivy-results-${{ matrix.image }}.json
            trivy-results-${{ matrix.image }}.sarif
            trivy-summary-${{ matrix.image }}.txt
            trivy-config-${{ matrix.image }}.txt
          retention-days: 30

  publish-report:
    name: Publish Security Report
    runs-on: ubuntu-latest
    needs: scan-all
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: read
      actions: read
    steps:
      - name: Download all Trivy artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: trivy-results-*
          path: trivy-results
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Generate combined security report
        run: python3 scripts/generate_security_report.py

      - name: Upload combined security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: |
            security-report.json
            security-report.md
            trivy-results/
          retention-days: 30

      - name: Set GitHub Job Summary
        run: python3 scripts/generate_job_summary.py
