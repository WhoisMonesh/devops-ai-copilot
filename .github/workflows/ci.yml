name: CI - Lint, Test & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: "ghcr.io/WhoisMonesh/devops-ai-copilot"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---- Lint & Test -------------------------------------------------------
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install all deps
        run: |
          pip install --upgrade pip
          pip install -r agent/requirements.txt
          pip install -r gui/requirements.txt
          pip install ruff pytest
      - name: Lint all code (ruff)
        run: ruff check agent/ gui/
      - name: Run tests
        run: |
          PYTHONPATH=. pytest tests/test_cache.py tests/test_permissions.py tests/test_llm_client.py::TestCircuitBreaker tests/test_llm_client.py::TestRetryWithBackoff::test_all_attempts_fail_raises tests/test_llm_client.py::TestRetryWithBackoff::test_retries_on_failure tests/test_llm_client.py::TestHealthCache tests/test_llm_client.py::TestTokenEstimation -v --tb=short

  # ---- Build & Push Docker images (Parallel) -----------------------------
  build-agent:
    name: Build Agent
    runs-on: ubuntu-latest
    needs: lint-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Extract metadata for devops-ai-copilot-agent
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/devops-ai-copilot-agent
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,onmatch=replace
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ github.sha }},enable=${{ github.ref == 'refs/heads/main' }}
      - name: Build & push devops-ai-copilot-agent
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/Dockerfile.agent
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=agent-cache
          cache-to: type=gha,scope=agent-cache,mode=max
          platforms: linux/amd64,linux/arm64

  build-gui:
    name: Build GUI
    runs-on: ubuntu-latest
    needs: lint-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Extract metadata for devops-ai-copilot-gui
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/devops-ai-copilot-gui
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,onmatch=replace
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ github.sha }},enable=${{ github.ref == 'refs/heads/main' }}
      - name: Build & push devops-ai-copilot-gui
        uses: docker/build-push-action@v7
        with:
          context: gui
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64

  build-ollama:
    name: Build Ollama
    runs-on: ubuntu-latest
    needs: lint-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Extract metadata for devops-ai-copilot-ollama
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/devops-ai-copilot-ollama
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,onmatch=replace
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ github.sha }},enable=${{ github.ref == 'refs/heads/main' }}
      - name: Build & push devops-ai-copilot-ollama
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/Dockerfile.ollama
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=ollama-cache
          cache-to: type=gha,scope=ollama-cache,mode=max
          build-args: OLLAMA_MODEL=qwen2.5:3b
          platforms: linux/amd64
